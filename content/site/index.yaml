home:
  hero:
    kicker: Welcome to Indo-German School
    image: hero3.jpg
    images:
      - hero6.jpg
      - hero3.jpg
    title: Where little minds bloom into big dreams.
    description: >-
      Indo-German School is a preschool in Kasturi Nagar offering early years learning in a structured and supervised environment.
      The school operates from a 10,000 sq. ft. campus, including a 4,000 sq. ft. outdoor play area, with space for both classroom activities and daily play.
    primaryCta:
      label: Apply Now
      to: /contact
    secondaryCta:
      label: Learn More
      to: /about
  programmes:
    kicker: Our Programmes
    title: Building foundations, one step at a time
    items:
      - title: Playgroup
        age: Ages 4.5 - 5.5 years
        desc: >-
          A play-based setting where children engage in simple activities that support movement, interaction, and early exploration.
      - title: Nursery
        age: Ages 3.5 - 4.5 years
        desc: >-
          Introduces early learning through stories, activities, and play, with exposure to basic literacy and number concepts.
      - title: Lower Kindergarten
        age: Ages 2.5 - 3.5 years
        desc: >-
          Builds early skills in reading, writing, and numbers through structured classroom activities.
      - title: Upper Kindergarten
        age: Ages 3.5 - 4.5 years
        desc: >-
          Prepares children for primary school with continued work in language, mathematics, and classroom routines.
      - title: Daycare
        age: Ages 4.5 - 5.5 years
        desc: >-
          A supervised environment with routines for play, rest, and daily care.
  whyUs:
    kicker: Why Indo-German School
    title: What to expect
    items:
      - title: Small group learning
        desc: >-
          CCTV-monitored campus with child-friendly infrastructure, hygienic
          facilities, and a secure pick-up and drop-off process.
      - title: Experienced teachers
        desc: >-
          Trained and caring teachers who understand the needs of young learners
          and create a warm classroom atmosphere.
      - title: 10,000 sq. ft. campus with outdoor play area
        desc: >-
          A balanced curriculum covering academics, arts, music, physical
          activity, and value education for well-rounded growth.
      - title: Recognised by the Government of Karnataka
        desc: >-
          Learning through play, projects, and real-world exploration that keeps
          children engaged, curious, and confident.
  cta:
    title: Admissions are open for 2025-26
    description: >-
      For enquiries, please contact the school or fill the enquiry form.
    primaryCta:
      label: View Admission Process
      to: /admissions
    secondaryCta:
      label: Contact Us
      to: /contact

about:
  intro:
    kicker: About Us
    image: hero7.jpg
    title: "Nurturing tomorrow's leaders, today."
    description: >-
      Indo-German School is a preschool in Kasturi Nagar offering early years education in a structured setting.
      The school operates from a 10,000 sq. ft. campus, including a 4,000 sq. ft. outdoor play area, with space for both classroom learning and play.
      Children learn in small groups, allowing teachers to give closer attention through regular routines and guided activities.

  mission:
    title: Approach
    description: >-
      The school follows a structured, activity-based approach for early learning. Children are introduced to basic skills through classroom routines, activities, and play.
  vision:
    title: Inclusive Learning
    description: >-
      The school is working towards building a more inclusive learning environment, where children with different learning needs are supported within the classroom.
      This is a developing area of focus, and the school is gradually strengthening its approach to inclusion.
  approach:
    kicker: IGS
    title: About the School
    paragraphs:
      - >-
        Indo-German School is a preschool in Kasturi Nagar offering early years education in a structured setting.
      - >-
        The school operates from a 10,000 sq. ft. campus, including a 4,000 sq. ft. outdoor play area, with space for both classroom learning and play.
      - >-
        Children learn in small groups, allowing teachers to give closer attention through regular routines and guided activities.
  team:
    kicker: Our Team
    groups:
      - title: Meet our Staff
        columns: '3'
        members:
          - name: Vimala Hariprasad
            role: Principal
            img: teachers/vimala.jpg
          - name: Reena Charles
            role: UKG Teacher
            img: teachers/reena.jpg
          - name: Rajeshwari
            role: LKG Teacher
            img: teachers/rajeshwari.jpg
          - name: Shibija
            role: Nursery Teacher
            img: teachers/shibija.jpg
          - name: Pavana
            role: Nursery Teacher
            img: teachers/pavana.jpg
      - title: Meet our Support Staff
        columns: '2'
        members:
          - name: Dharini
            role: Support Staff
            img: staff/dharini.jpg
          - name: Monica
            role: Support Staff
            img: staff/monica.jpg
  campus:
    kicker: Our Campus
    title: A space designed for little explorers
    items:
      - title: Bright Classrooms
        img: campus/classroom.jpg
        desc: >-
          Spacious, well-ventilated rooms with age-appropriate furniture,
          learning aids, and colourful displays.
      - title: Safe Play Areas
        img: campus/play.jpg
        desc: >-
          Outdoor and indoor play zones with soft flooring, climbing frames,
          slides, and sandpits.
      - title: Activity Rooms
        img: campus/activityroom.jpg
        desc: >-
          Dedicated spaces for art, music, dance, and storytelling to encourage
          creative expression.
      - title: CCTV Monitoring
        img: campus/cctv.jpg
        desc: Round-the-clock camera surveillance for the safety and security of every child.
  cta:
    title: Come visit us
    description: >-
      We'd love to show you around our campus. Schedule a visit or get in touch
      to learn more about our school.
    label: Get in Touch
    to: /contact

admissions:
  header:
    kicker: 2026-27
    title: 'Admissions are open for 2026-27'
    description: >-
      For admissions and enquiries, please contact the school or fill the enquiry form.
  eligibility:
    kicker: Eligibility
    title: Age criteria for each programme
    items:
      - programme: Nursery
        age: 2.5 - 3.5 years
        note: Child should be 2.5 years old as on 1st April of the academic year.
      - programme: LKG
        age: 3.5 - 4.5 years
        note: Child should be 3.5 years old as on 1st April of the academic year.
      - programme: UKG
        age: 4.5 - 5.5 years
        note: Child should be 4.5 years old as on 1st April of the academic year.
  process:
    kicker: How to Apply
    title: Step-by-step admission process
    steps:
      - step: '1'
        title: Enquiry & Campus Visit
        desc: >-
          Contact us by phone, email, or visit our campus to learn about our
          programmes. We encourage parents to take a tour of the school to see
          our facilities and meet our teachers.
      - step: '2'
        title: Fill the Application Form
        desc: >-
          Collect the application form from the school office or request one via
          email. Fill in the required details about the child and the family.
      - step: '3'
        title: Submit Documents
        desc: >-
          Submit the completed application form along with the required
          documents (listed below) to the school office.
      - step: '4'
        title: Interaction Session
        desc: >-
          A short, informal interaction session will be scheduled with the child
          and parents.
      - step: '5'
        title: Admission Confirmation
        desc: >-
          Upon successful completion of the interaction session, you will
          receive an admission offer. Complete the fee payment to confirm your
          child's seat.
  documents:
    kicker: Checklist
    title: Documents required
    items:
      - Completed application form
      - Birth certificate of the child (original + photocopy)
      - 2 recent passport-size photographs of the child
      - Aadhaar card of parents (photocopy)
  dates:
    kicker: Academic Calendar
    title: Important dates
    items:
      - label: Application Period
        value: October - March (or until seats are filled)
      - label: Interaction Sessions
        value: November - March (scheduled individually)
      - label: Academic Year Begins
        value: April / June (as per state guidelines)
      - label: Orientation Day
        value: One week before classes begin
  cta:
    title: Ready to apply?
    description: >-
      Contact us to collect the application form or to schedule a campus visit.
      We're happy to answer any questions you may have.
    label: Contact Us
    to: /contact

